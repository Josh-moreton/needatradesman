# SonarQube/SonarCloud project configuration for needatradesman
# Configured for SonarCloud public project with TypeScript/Next.js
sonar.projectKey=Josh-moreton_needatradesman
sonar.organization=josh-moreton
sonar.host.url=https://sonarcloud.io
sonar.projectName=needatradesman
sonar.projectVersion=0.1.0

# Source code directories (comma-separated)
sonar.sources=src

# Exclusions - Next.js and build artifacts
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/build/**,**/dist/**,**/*.config.ts,**/*.config.js,**/*.config.mjs,**/ios/**,**/public/**

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Tests - if you add test coverage later
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Encoding of the source code
sonar.sourceEncoding=UTF-8
